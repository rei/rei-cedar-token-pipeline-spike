name: canonical contract

on:
  pull_request:
  workflow_dispatch:

jobs:
  validate-canonical-contract:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Normalize tokens
        run: pnpm tokens:normalize

      - name: Validate canonical contract
        run: pnpm test:contract
