name: ADR governance

on:
  pull_request:
  workflow_dispatch:

jobs:
  validate-adr-governance:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Validate ADR governance
        run: node scripts/validate-adr-governance.js
