name: PR Storybook Preview
on:
  pull_request:
    types: [opened, reopened, synchronize]
  workflow_dispatch:

jobs:
  preview-storybook:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      pages: write
      id-token: write

    env:
      PR_BRANCH: ${{ replace(github.head_ref, '/', '-') }}
      STORYBOOK_BASE_URL: /rei-cedar-token-pipeline-spike/pr/${{ env.PR_BRANCH }}/
      STORYBOOK_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/pr/${{ env.PR_BRANCH }}/

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Storybook preview
        run: pnpm storybook:build
        env:
          STORYBOOK_BASE_URL: ${{ env.STORYBOOK_BASE_URL }}

      - name: Deploy Storybook preview to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./storybook-static
          publish_branch: gh-pages
          destination_dir: pr/${{ env.PR_BRANCH }}
          keep_files: true

      - name: Comment PR with Storybook preview URL
        uses: peter-evans/create-or-update-comment@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            ✅ Storybook preview for this PR is available at:
            ${{ env.STORYBOOK_URL }}

